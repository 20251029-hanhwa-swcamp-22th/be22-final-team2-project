name: Full Stack Validation

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          token: ${{ secrets.SUBMODULE_SYNC_PAT }}

      - name: Setup JWT keys
        working-directory: team2-manifest
        run: |
          bash scripts/generate-rsa-keys.sh -o secrets/jwt
          chmod 0644 secrets/jwt/private.pem secrets/jwt/public.pem
          ls -lh secrets/jwt/

      - name: Docker login GHCR
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          SUBMODULE_SYNC_PAT: ${{ secrets.SUBMODULE_SYNC_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TOKEN="${GHCR_PAT:-${SUBMODULE_SYNC_PAT:-$GITHUB_TOKEN}}"
          echo "$TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull images
        working-directory: team2-manifest
        run: docker compose pull

      - name: Start services
        working-directory: team2-manifest
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'team2-test-db-password' }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD || 'team2-test-mail-password' }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN || 'team2-internal-test-token' }}
          JWT_KEYS_DIR: ./secrets/jwt
        run: docker compose up -d

      - name: Wait for services to become healthy
        working-directory: team2-manifest
        timeout-minutes: 5
        run: |
          set -e
          for i in $(seq 1 60); do
            unhealthy=$(docker compose ps --format json \
              | jq -r 'select(.Health != null and .Health != "healthy") | .Name' || true)
            if [ -z "$unhealthy" ]; then
              # 모든 healthcheck 정의된 컨테이너가 healthy. 추가로 auth jwks 응답 확인
              if curl -sf http://localhost:8001/.well-known/jwks.json > /dev/null 2>&1; then
                echo "All services healthy"
                exit 0
              fi
            fi
            echo "[$i/60] waiting... unhealthy=[$unhealthy]"
            sleep 5
          done
          echo "Health check timeout"
          docker compose ps
          exit 1

      - name: E2E smoke test (JWT issuance + Gateway routing)
        working-directory: team2-manifest
        run: |
          set -e
          # 1. JWKS 응답 검증 (kid 존재)
          curl -sf http://localhost:8001/.well-known/jwks.json | jq -e '.keys[0].kid' > /dev/null
          echo "✓ JWKS endpoint OK"

          # 2. 로그인 → 토큰 발급 (admin 계정)
          LOGIN_RESPONSE=$(curl -sf -X POST http://localhost:8001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@hanwha.com","password":"password123"}' || echo "")
          if [ -z "$LOGIN_RESPONSE" ]; then
            echo "Login failed for admin@hanwha.com"
            exit 1
          fi
          TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.accessToken // .access_token // empty')
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || (echo "JWT extraction FAILED"; exit 1)
          echo "✓ JWT issuance OK"

          # 3. Gateway 경유 인증된 호출
          curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8001/api/users > /dev/null
          echo "✓ Gateway routing + RBAC OK"

          # 4. /api/email-logs/internal 외부 차단 검증 (denyAll)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8001/api/email-logs/internal/test || echo "000")
          if [ "$STATUS" = "403" ] || [ "$STATUS" = "404" ]; then
            echo "✓ /api/email-logs/internal external access blocked ($STATUS)"
          else
            echo "✗ /api/email-logs/internal NOT blocked (status=$STATUS)"
            exit 1
          fi

      - name: Collect logs
        if: always()
        working-directory: team2-manifest
        run: |
          mkdir -p test-artifacts
          docker compose logs > test-artifacts/docker-compose.log 2>&1 || true
          docker compose ps > test-artifacts/services.txt 2>&1 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs-${{ github.run_id }}
          path: team2-manifest/test-artifacts/
          retention-days: 14

      - name: Cleanup
        if: always()
        working-directory: team2-manifest
        run: docker compose down -v
