name: "📝 문서 작업"
description: "문서 작성, 수정, 보완이 필요할 때 사용합니다."
title: "[Docs] "
labels: ["docs"]
body:
  - type: textarea
    id: description
    attributes:
      label: 작업 설명
      description: 어떤 문서 작업인지 설명해주세요.
      placeholder: "ex) API 명세서를 작성합니다. / README를 업데이트합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 세부 작업 항목을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] API 명세서 작성
        - [ ] README 업데이트
        - [ ] ERD 문서 갱신
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 관련 문서나 참고 자료 링크
    validations:
      required: false
