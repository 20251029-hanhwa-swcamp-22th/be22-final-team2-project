apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: team2-prod
  region: ap-northeast-2
  version: "1.30"
  tags:
    Project: team2
    Env: prod

vpc:
  nat:
    gateway: Single

iam:
  withOIDC: true

managedNodeGroups:
  - name: ng-default
    instanceType: t3.medium
    minSize: 1
    maxSize: 3
    desiredCapacity: 2
    volumeSize: 30
    privateNetworking: true
    labels:
      role: worker
    tags:
      Project: team2
      Env: prod

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns
  - name: aws-ebs-csi-driver

cloudWatch:
  clusterLogging:
    enableTypes: []
